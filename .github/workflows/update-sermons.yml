name: Update Latest Sermons

on:
  schedule:
    # Runs every 3 hours. Adjust as you like (cron is in UTC).
    - cron: "0 */3 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest sermons
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python scripts/fetch_latest_sermons.py

      - name: Commit updated videos.json
        run: |
          git config user.name "sermon-feed-bot"
          git config user.email "actions@github.com"
          git add docs/videos.json
          git diff --staged --quiet || git commit -m "Update latest sermons"
          git push
